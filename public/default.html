<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MgGraph Index</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>(function(){var s=localStorage.getItem('theme'),d=window.matchMedia('(prefers-color-scheme:dark)').matches;if(s==='dark'||(!s&&d))document.documentElement.classList.add('dark')})()</script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        surface: {
                            950: 'rgb(var(--surface-950) / <alpha-value>)',
                            900: 'rgb(var(--surface-900) / <alpha-value>)',
                            800: 'rgb(var(--surface-800) / <alpha-value>)',
                            700: 'rgb(var(--surface-700) / <alpha-value>)',
                            600: 'rgb(var(--surface-600) / <alpha-value>)',
                        },
                        text: {
                            primary: 'rgb(var(--text-primary) / <alpha-value>)',
                            secondary: 'rgb(var(--text-secondary) / <alpha-value>)',
                            tertiary: 'rgb(var(--text-tertiary) / <alpha-value>)',
                            ghost: 'rgb(var(--text-ghost) / <alpha-value>)',
                        },
                        accent: {
                            sky: 'rgb(var(--accent-sky) / <alpha-value>)',
                            indigo: 'rgb(var(--accent-indigo) / <alpha-value>)',
                            violet: 'rgb(var(--accent-violet) / <alpha-value>)',
                            emerald: 'rgb(var(--accent-emerald) / <alpha-value>)',
                            amber: 'rgb(var(--accent-amber) / <alpha-value>)',
                            rose: 'rgb(var(--accent-rose) / <alpha-value>)',
                            cyan: 'rgb(var(--accent-cyan) / <alpha-value>)',
                        },
                    },
                    fontFamily: {
                        sans: ["'Inter'", 'system-ui', 'sans-serif'],
                        mono: ["'JetBrains Mono'", 'monospace'],
                    },
                    animation: {
                        'fade-in': 'fade-in 0.2s ease forwards',
                        'spin': 'spin 0.8s linear infinite',
                    },
                    keyframes: {
                        'fade-in': {
                            from: { opacity: '0', transform: 'translateY(4px)' },
                            to: { opacity: '1', transform: 'translateY(0)' },
                        },
                    },
                },
            },
        }
    </script>
    <style>
        :root { --surface-950:248 250 252;--surface-900:241 245 249;--surface-800:226 232 240;--surface-700:203 213 225;--surface-600:148 163 184;--text-primary:15 23 42;--text-secondary:51 65 85;--text-tertiary:100 116 139;--text-ghost:148 163 184;--accent-sky:2 132 199;--accent-indigo:79 70 229;--accent-violet:124 58 237;--accent-emerald:5 150 105;--accent-amber:217 119 6;--accent-rose:225 29 72;--accent-cyan:8 145 178; }
        :root.dark { --surface-950:11 15 26;--surface-900:15 23 41;--surface-800:26 35 50;--surface-700:36 48 68;--surface-600:51 65 85;--text-primary:226 232 240;--text-secondary:148 163 184;--text-tertiary:100 116 139;--text-ghost:71 85 105;--accent-sky:56 189 248;--accent-indigo:129 140 248;--accent-violet:167 139 250;--accent-emerald:52 211 153;--accent-amber:251 191 36;--accent-rose:251 113 133;--accent-cyan:34 211 238; }
        pre::-webkit-scrollbar { height: 6px; }
        pre::-webkit-scrollbar-track { background: rgb(var(--surface-800)); border-radius: 3px; }
        pre::-webkit-scrollbar-thumb { background: rgb(var(--surface-600)); border-radius: 3px; }
        pre::-webkit-scrollbar-thumb:hover { background: rgb(var(--text-ghost)); }
        details[open] > summary svg { transform: rotate(90deg); }
        summary { list-style: none; }
        summary::-webkit-details-marker { display: none; }
        select option { background: rgb(var(--surface-900)); color: rgb(var(--text-primary)); }
        .verb-get, .verb-find { border-left-color: rgb(var(--accent-emerald)) !important; }
        .verb-set, .verb-update { border-left-color: rgb(var(--accent-amber)) !important; }
        .verb-new, .verb-confirm { border-left-color: rgb(var(--accent-sky)) !important; }
        .verb-remove, .verb-clear { border-left-color: rgb(var(--accent-rose)) !important; }
        .verb-invoke { border-left-color: rgb(var(--accent-cyan)) !important; }
        .verb-add { border-left-color: rgb(var(--accent-indigo)) !important; }
        .verb-connect, .verb-disconnect { border-left-color: rgb(var(--text-tertiary)) !important; }
        .card-expanded .line-clamp-2 { -webkit-line-clamp: unset; }
        .card-focused { outline: 2px solid rgb(var(--accent-sky)); outline-offset: 2px; }
        .ps-comment { color: rgb(var(--text-ghost)); font-style: italic; }
        .ps-string { color: rgb(var(--accent-amber)); }
        .ps-variable { color: rgb(var(--accent-sky)); }
        .ps-cmdlet { color: rgb(var(--accent-emerald)); }
        .ps-type { color: rgb(var(--accent-violet)); }
        .copy-btn { opacity: 0; transition: opacity 0.15s; }
        .group:hover .copy-btn, .copy-btn:focus { opacity: 1; }
        .alpha-index { scrollbar-width: none; }
        .alpha-index::-webkit-scrollbar { display: none; }
        .onboarding-tip { filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3)); }
    </style>
</head>
<body class="font-sans bg-surface-950 text-text-primary min-h-screen antialiased">
    <!-- Sticky Header + Filters -->
    <div class="sticky top-0 z-40">
        <header class="relative z-10 backdrop-blur-xl bg-surface-950/80 border-b border-surface-700/50">
            <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between max-sm:flex-col max-sm:gap-3">
                <div>
                    <h1 class="text-2xl font-bold bg-gradient-to-r from-accent-sky to-accent-indigo bg-clip-text text-transparent">MgGraph Index</h1>
                    <p class="text-sm text-text-tertiary">Microsoft Graph PowerShell Cmdlet Index</p>
                </div>
                <div class="flex items-center gap-4 font-mono text-sm">
                    <div class="text-center">
                        <div class="text-xl font-semibold text-text-primary" id="totalCmdlets">0</div>
                        <div class="text-xs text-text-ghost uppercase tracking-wider">Total</div>
                    </div>
                    <div class="w-px h-8 bg-surface-700"></div>
                    <div class="text-center">
                        <div class="text-xl font-semibold text-text-primary" id="filteredCount">0</div>
                        <div class="text-xs text-text-ghost uppercase tracking-wider">Showing</div>
                    </div>
                    <div class="w-px h-8 bg-surface-700"></div>
                    <div class="relative" id="exportWrap">
                        <button onclick="toggleExportMenu()" class="p-2 rounded-lg border border-surface-700 text-text-tertiary hover:text-text-primary hover:border-surface-600 transition-colors" aria-label="Export results" title="Export filtered results">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                        </button>
                        <div id="exportMenu" class="hidden absolute right-0 top-full mt-1 bg-surface-900 border border-surface-700 rounded-lg shadow-xl z-50 py-1 min-w-[120px]">
                            <button onclick="exportResults('json')" class="block w-full text-left px-3 py-1.5 text-sm text-text-secondary hover:bg-surface-800 hover:text-text-primary transition-colors">JSON</button>
                            <button onclick="exportResults('csv')" class="block w-full text-left px-3 py-1.5 text-sm text-text-secondary hover:bg-surface-800 hover:text-text-primary transition-colors">CSV</button>
                        </div>
                    </div>
                    <button onclick="applyTheme(document.documentElement.classList.contains('dark')?'light':'dark')" class="p-2 rounded-lg border border-surface-700 text-text-tertiary hover:text-text-primary hover:border-surface-600 transition-colors" id="themeToggle" aria-label="Toggle theme">
                        <svg id="themeIconSun" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                        <svg id="themeIconMoon" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                    </button>
                    <select class="px-3 py-1.5 bg-surface-900 border border-surface-700 text-text-secondary rounded-lg text-xs cursor-pointer outline-none transition-all focus:border-accent-sky focus:ring-1 focus:ring-accent-sky/30" id="themeSwitcher" aria-label="Switch theme" onchange="switchTheme(this.value)">
                        <option value="default.html" selected>Default</option>
                        <option value="index.html">Glass</option>
                        <option value="cyberpunk.html">Cyberpunk</option>
                    </select>
                </div>
            </div>
        </header>
        <div class="backdrop-blur-xl bg-surface-950/80 border-b border-surface-700/50">
            <div class="max-w-7xl mx-auto px-6 py-3 space-y-3">
                <div class="flex gap-3 max-sm:flex-col">
                    <div class="relative flex-1 min-w-0">
                        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-text-ghost" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        <input type="text" class="w-full pl-10 pr-4 py-2 bg-surface-900 border border-surface-700 text-text-primary rounded-lg text-sm outline-none transition-all placeholder:text-text-ghost focus:border-accent-sky focus:ring-1 focus:ring-accent-sky/30" id="searchInput" placeholder="Search">
                        <div id="recentSearches" class="hidden absolute left-0 right-0 top-full mt-1 bg-surface-900 border border-surface-700 rounded-lg shadow-xl z-50 py-1 max-h-64 overflow-y-auto"></div>
                    </div>
                    <select class="px-4 py-2 bg-surface-900 border border-surface-700 text-text-primary rounded-lg text-sm cursor-pointer outline-none transition-all focus:border-accent-sky focus:ring-1 focus:ring-accent-sky/30" id="categoryFilter" aria-label="Category filter">
                        <option value="">All Categories</option>
                    </select>
                    <select class="px-4 py-2 bg-surface-900 border border-surface-700 text-text-primary rounded-lg text-sm cursor-pointer outline-none transition-all focus:border-accent-sky focus:ring-1 focus:ring-accent-sky/30" id="moduleFilter" aria-label="Module filter">
                        <option value="">All Modules</option>
                    </select>
                    <select class="px-4 py-2 bg-surface-900 border border-surface-700 text-text-primary rounded-lg text-sm cursor-pointer outline-none transition-all focus:border-accent-sky focus:ring-1 focus:ring-accent-sky/30" id="permissionFilter" aria-label="Permission filter">
                        <option value="">All Permissions</option>
                    </select>
                    <select class="px-4 py-2 bg-surface-900 border border-surface-700 text-text-primary rounded-lg text-sm cursor-pointer outline-none transition-all focus:border-accent-sky focus:ring-1 focus:ring-accent-sky/30" id="apiVersionFilter" aria-label="API version filter">
                        <option value="">All Versions</option>
                        <option value="v1.0">v1.0</option>
                        <option value="beta">Beta</option>
                    </select>
                    <select class="px-4 py-2 bg-surface-900 border border-surface-700 text-text-primary rounded-lg text-sm cursor-pointer outline-none transition-all focus:border-accent-sky focus:ring-1 focus:ring-accent-sky/30" id="sortSelect" aria-label="Sort by">
                        <option value="alpha">Sort: A-Z</option>
                        <option value="category">Sort: Category</option>
                        <option value="permissions">Sort: Permissions</option>
                        <option value="examples">Sort: Examples</option>
                    </select>
                </div>
                <div class="flex items-center gap-2">
                    <button id="mobileFilterToggle" class="sm:hidden px-3 py-1.5 text-sm font-medium rounded-full border border-surface-700 text-text-tertiary hover:text-text-secondary transition-colors" onclick="toggleMobileFilters()">Filters <span id="filterBadge" class="hidden ml-1 px-1.5 py-0.5 text-xs bg-accent-sky/20 text-accent-sky rounded-full"></span></button>
                    <div class="hidden sm:flex gap-1.5 flex-wrap" id="verbFilters"></div>
                </div>
                <div class="flex items-center gap-2 flex-wrap" id="presetsBar">
                    <div class="flex gap-1.5 flex-wrap" id="presetsList"></div>
                    <button onclick="savePreset()" class="px-2.5 py-1 text-xs font-medium rounded-full border border-surface-700 text-text-ghost hover:text-text-secondary hover:border-surface-600 transition-colors">+ Save Preset</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-6 py-6">
        <div class="grid grid-cols-1 gap-4" id="cmdletsGrid">
            <div class="col-span-full text-center py-16 px-5">
                <div class="inline-block w-8 h-8 border-2 border-surface-700 border-t-accent-sky rounded-full animate-spin"></div>
                <div class="text-text-secondary mt-3 text-sm">Loading cmdlets...</div>
            </div>
        </div>
        <div class="hidden text-center py-16 px-5" id="noResults">
            <h3 class="text-text-secondary text-lg">No Matches Found</h3>
            <p class="text-text-ghost mt-2 text-sm">Try adjusting your search or filters</p>
        </div>
        <div id="scrollSentinel" class="h-1"></div>
    </main>

    <!-- Jump-to-letter sidebar -->
    <nav id="alphaIndex" class="hidden lg:flex fixed right-2 top-1/2 -translate-y-1/2 flex-col items-center gap-0.5 text-xs font-mono text-text-ghost alpha-index z-30"></nav>

    <!-- Back-to-top button -->
    <button id="backToTop" class="fixed bottom-6 right-6 p-3 rounded-full bg-surface-800 border border-surface-700 text-text-secondary hover:text-text-primary hover:border-surface-600 shadow-lg transition-all opacity-0 pointer-events-none z-30" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Back to top">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"/></svg>
    </button>

    <!-- Onboarding tooltip container -->
    <div id="onboardingOverlay" class="hidden fixed inset-0 z-50 pointer-events-none">
        <div id="onboardingTip" class="onboarding-tip absolute bg-surface-800 border border-accent-sky/30 rounded-lg p-4 max-w-xs pointer-events-auto shadow-xl">
            <p id="tipText" class="text-sm text-text-primary mb-3"></p>
            <div class="flex gap-2 justify-end">
                <button onclick="dismissOnboarding()" class="px-3 py-1 text-xs text-text-tertiary hover:text-text-secondary transition-colors">Dismiss</button>
                <button onclick="showNextTip()" class="px-3 py-1 text-xs bg-accent-sky/20 text-accent-sky rounded-md hover:bg-accent-sky/30 transition-colors">Next</button>
            </div>
        </div>
    </div>

    <script>
        let cmdlets = [];
        let filteredCmdlets = [];
        let activeVerbs = new Set();
        let renderedCount = 0;
        const CHUNK_SIZE = 50;
        let scrollObserver = null;
        let currentTheme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        let focusedCardIndex = -1;
        let recentSearches = JSON.parse(localStorage.getItem('recentSearches') || '[]');
        let nounMap = {};
        let currentSort = 'alpha';
        let savedPresets = JSON.parse(localStorage.getItem('savedPresets') || '[]');
        let hasSeenOnboarding = localStorage.getItem('hasSeenOnboarding') === 'true';
        let onboardingStep = 0;
        const moduleDetailCache = new Map();
        const permissionIndex = new Map(); // permission name -> Set of cmdlet names

        function debounce(fn, ms) {
            let id;
            return (...args) => { clearTimeout(id); id = setTimeout(() => fn(...args), ms); };
        }

        // -- HTML escaping --
        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // -- Verb extraction --
        function getVerb(name) {
            const idx = name.indexOf('-');
            return idx > 0 ? name.substring(0, idx) : '';
        }

        // -- Load manifest.json, fallback to cmdlets.json --
        async function loadCmdlets() {
            try {
                const response = await fetch('data/manifest.json');
                if (!response.ok) throw new Error('HTTP ' + response.status);
                const data = await response.json();

                cmdlets = data.map(c => ({
                    name: c.name || 'Unknown Cmdlet',
                    verb: c.verb || getVerb(c.name || ''),
                    category: c.category || 'General',
                    module: c.module || '',
                    apiVersion: c.apiVersion || 'v1.0',
                    description: c.description || 'Microsoft Graph PowerShell cmdlet.',
                    permissionCount: c.permissionCount || 0,
                    hasExamples: !!c.hasExamples,
                }));

                buildNounMap();
                filteredCmdlets = [...cmdlets];
                populateFilters();
                restoreState();
                updateThemeIcons();
                if (!hasSeenOnboarding) setTimeout(showNextTip, 800);
                // Load all module details in background for permission filtering
                loadAllModuleDetails();
            } catch (e) {
                console.warn('Manifest load failed, trying cmdlets.json:', e.message);
                try {
                    const response = await fetch('data/cmdlets.json');
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    const data = await response.json();
                    const arr = Array.isArray(data) ? data : (data.cmdlets || [data]);

                    // Build module detail cache from flat file so card expand works
                    arr.forEach(function(c) {
                        var mod = c.module || '';
                        if (!mod) return;
                        if (!moduleDetailCache.has(mod)) {
                            moduleDetailCache.set(mod, { module: mod, cmdlets: {} });
                        }
                        moduleDetailCache.get(mod).cmdlets[c.name] = {
                            syntax: c.syntax || '',
                            examples: Array.isArray(c.examples) ? c.examples : (c.examples ? [c.examples] : []),
                            permissions: Array.isArray(c.permissions) ? c.permissions : (c.permissions ? [c.permissions] : []),
                        };
                    });

                    cmdlets = arr.map(c => ({
                        name: c.name || 'Unknown Cmdlet',
                        verb: c.verb || getVerb(c.name || ''),
                        category: c.category || 'General',
                        module: c.module || '',
                        apiVersion: c.apiVersion || 'v1.0',
                        description: c.description || 'Microsoft Graph PowerShell cmdlet.',
                        permissionCount: Array.isArray(c.permissions) ? c.permissions.length : 0,
                        hasExamples: Array.isArray(c.examples) && c.examples.length > 0,
                    }));

                    buildNounMap();
                    filteredCmdlets = [...cmdlets];
                    // Permission data already in moduleDetailCache from flat file
                    buildPermissionIndex();
                    populateFilters();
                    populatePermissionFilter();
                    restoreState();
                    updateThemeIcons();
                    if (!hasSeenOnboarding) setTimeout(showNextTip, 800);
                } catch (e2) {
                    document.getElementById('cmdletsGrid').innerHTML =
                        '<div class="col-span-full text-center py-16 px-5">' +
                        '<h3 class="text-accent-rose text-lg">Failed to load cmdlet data</h3>' +
                        '<p class="text-text-ghost mt-2 text-sm">Could not fetch manifest.json or cmdlets.json. Run the extraction script first.</p></div>';
                }
            }
        }

        // -- Lazy load module detail --
        async function loadModuleDetail(moduleName) {
            if (moduleDetailCache.has(moduleName)) return moduleDetailCache.get(moduleName);
            try {
                const response = await fetch('data/modules/' + encodeURIComponent(moduleName) + '.json');
                if (!response.ok) throw new Error('HTTP ' + response.status);
                const data = await response.json();
                moduleDetailCache.set(moduleName, data);
                return data;
            } catch (e) {
                console.warn('Failed to load module detail for ' + moduleName + ':', e.message);
                return null;
            }
        }

        // -- Build permission index from all cached module data --
        function buildPermissionIndex() {
            permissionIndex.clear();
            moduleDetailCache.forEach(function(modData) {
                if (!modData || !modData.cmdlets) return;
                Object.keys(modData.cmdlets).forEach(function(cmdName) {
                    var perms = modData.cmdlets[cmdName].permissions;
                    if (!Array.isArray(perms)) return;
                    perms.forEach(function(p) {
                        if (!permissionIndex.has(p)) permissionIndex.set(p, new Set());
                        permissionIndex.get(p).add(cmdName);
                    });
                });
            });
        }

        // -- Populate permission dropdown from index --
        function populatePermissionFilter() {
            var select = document.getElementById('permissionFilter');
            var currentVal = select.value;
            var perms = [...permissionIndex.keys()].sort();
            select.innerHTML = '<option value="">All Permissions</option>' +
                perms.map(function(p) {
                    return '<option value="' + escapeHtml(p) + '">' + escapeHtml(p) + ' (' + permissionIndex.get(p).size + ')</option>';
                }).join('');
            if (currentVal && perms.includes(currentVal)) select.value = currentVal;
        }

        // -- Load all module detail files in background for permission filtering --
        async function loadAllModuleDetails() {
            var modules = [...new Set(cmdlets.map(function(c) { return c.module; }).filter(function(m) { return m; }))];
            var promises = modules.map(function(m) { return loadModuleDetail(m); });
            await Promise.all(promises);
            buildPermissionIndex();
            populatePermissionFilter();
        }

        // -- Populate detail into an expanded card --
        async function populateCardDetail(card, cmdletName, moduleName) {
            const detailContainer = card.querySelector('.card-detail');
            if (!detailContainer || detailContainer.dataset.loaded === 'true') return;

            detailContainer.innerHTML = '<div class="text-center py-4"><div class="inline-block w-5 h-5 border-2 border-surface-700 border-t-accent-sky rounded-full animate-spin"></div><div class="text-text-ghost text-xs mt-1">Loading details...</div></div>';

            const moduleData = await loadModuleDetail(moduleName);
            if (!moduleData || !moduleData.cmdlets || !moduleData.cmdlets[cmdletName]) {
                detailContainer.innerHTML = '<p class="text-text-ghost text-xs py-2">Detail not available.</p>';
                detailContainer.dataset.loaded = 'true';
                return;
            }

            const detail = moduleData.cmdlets[cmdletName];
            let html = '';

            // Syntax
            if (detail.syntax) {
                html += '<div class="relative group mb-3"><div class="bg-surface-800 rounded-lg p-3 pr-10 text-xs font-mono text-accent-emerald overflow-x-auto whitespace-pre-wrap break-all leading-relaxed">' + escapeHtml(detail.syntax) + '</div>' +
                    '<button class="copy-btn absolute top-2 right-2 p-1.5 rounded-md bg-surface-700/50 hover:bg-surface-700 text-text-ghost hover:text-text-primary transition-all" data-copy-syntax="1" title="Copy syntax" onclick="event.stopPropagation()"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg></button></div>';
            }

            // Parameters
            if (detail.syntax) {
                const params = parseParameters(detail.syntax);
                if (params.length > 0) {
                    html += '<details class="mb-2" onclick="event.stopPropagation()">' +
                        '<summary class="flex items-center gap-2 cursor-pointer text-sm text-text-tertiary hover:text-text-secondary transition-colors py-1">' +

            // Examples
            if (detail.examples && detail.examples.length > 0) {

                    '<svg class="w-3.5 h-3.5 transition-transform duration-150" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>' +
                    '<span>' + detail.examples.length + ' example' + (detail.examples.length > 1 ? 's' : '') + '</span></summary>' +

                            '<button class="copy-btn absolute top-2 right-2 p-1.5 rounded-md bg-surface-700/50 hover:bg-surface-700 text-text-ghost hover:text-text-primary transition-all" data-copy-ex="1" title="Copy" onclick="event.stopPropagation()"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg></button></div>';
                    }).join('') +
                    '</div></details>';
            }

            // Permissions
            if (detail.permissions && detail.permissions.length > 0) {
                html += '<div class="flex flex-wrap gap-1.5 mt-auto pt-3">' +
                    detail.permissions.map(function(p) {
                        return '<span class="inline-block bg-accent-indigo/10 border border-accent-indigo/20 text-accent-indigo px-2 py-0.5 text-xs rounded-md font-mono">' + escapeHtml(p) + '</span>';
                    }).join('') + '</div>';
            }

            // Related cmdlets
            const noun = cmdletName.indexOf('-') > 0 ? cmdletName.substring(cmdletName.indexOf('-') + 1) : '';
            const related = noun && nounMap[noun] ? nounMap[noun].filter(function(n) { return n !== cmdletName; }) : [];
            if (related.length > 0) {
                html += '<div class="flex flex-wrap gap-1.5 mt-2">' +
                    related.slice(0, 5).map(function(r) {
                        return '<button class="text-xs px-2 py-0.5 rounded-md bg-surface-800 text-text-tertiary hover:text-accent-sky hover:bg-surface-700 transition-colors font-mono" onclick="event.stopPropagation();document.getElementById(\'searchInput\').value=\'' + escapeHtml(r) + '\';filterCmdlets()">' + escapeHtml(r) + '</button>';
                    }).join('') +
                    (related.length > 5 ? '<span class="text-xs text-text-ghost px-1 self-center">+' + (related.length - 5) + ' more</span>' : '') +
                    '</div>';
            }

            detailContainer.innerHTML = html;
            detailContainer.dataset.loaded = 'true';

            // Auto-open details if card is expanded
            if (card.classList.contains('card-expanded')) {
                card.querySelectorAll('.card-detail details').forEach(function(d) { d.open = true; });

        }

        // -- Dynamically build filter dropdowns and verb buttons --
        const tagBase = 'px-3 py-1.5 text-sm font-medium rounded-full border transition-all duration-150 cursor-pointer select-none';
        const tagInactive = 'bg-transparent text-text-tertiary border-surface-700 hover:text-text-secondary hover:border-surface-600 hover:bg-surface-800/50';
        const tagActive = 'bg-accent-sky/15 text-accent-sky border-accent-sky/30';

        function populateFilters() {
            const catSelect = document.getElementById('categoryFilter');
            const categories = [...new Set(cmdlets.map(function(c) { return c.category; }))].sort();
            catSelect.innerHTML = '<option value="">All Categories</option>' +
                categories.map(function(c) { return '<option value="' + escapeHtml(c) + '">' + escapeHtml(c) + '</option>'; }).join('');

            const modSelect = document.getElementById('moduleFilter');
            const modules = [...new Set(cmdlets.map(function(c) { return c.module; }).filter(function(m) { return m; }))].sort();
            modSelect.innerHTML = '<option value="">All Modules</option>' +
                modules.map(function(m) {
                    const short = m.replace(/^Microsoft\.Graph\./, '');
                    return '<option value="' + escapeHtml(m) + '">' + escapeHtml(short) + '</option>';
                }).join('');

            const verbs = [...new Set(cmdlets.map(function(c) { return c.verb; }).filter(function(v) { return v; }))].sort();
            const verbContainer = document.getElementById('verbFilters');
            verbContainer.innerHTML = '<button class="' + tagBase + ' ' + tagActive + '" data-filter="all">All</button>' +
                verbs.map(function(v) { return '<button class="' + tagBase + ' ' + tagInactive + '" data-filter="' + escapeHtml(v) + '">' + escapeHtml(v) + '</button>'; }).join('');

            verbContainer.querySelectorAll('button').forEach(function(tag) {
                tag.addEventListener('click', function() {
                    var filter = this.dataset.filter;
                    if (filter === 'all') {
                        activeVerbs.clear();
                    } else if (activeVerbs.has(filter)) {
                        activeVerbs.delete(filter);
                    } else {
                        activeVerbs.add(filter);
                    }
                    refreshVerbButtonStyles();
                    filterCmdlets();
                });
            });

            renderPresets();
        }

        // -- Filter cmdlets --
        function filterCmdlets() {
            var searchTerm = document.getElementById('searchInput').value.trim();
            var searchLower = searchTerm.toLowerCase();
            var categoryVal = document.getElementById('categoryFilter').value;
            var moduleVal = document.getElementById('moduleFilter').value;
            var permVal = document.getElementById('permissionFilter').value;
            var apiVal = document.getElementById('apiVersionFilter').value;
            currentSort = document.getElementById('sortSelect').value;

            if (searchTerm.length >= 2) saveRecentSearch(searchTerm);

            filteredCmdlets = cmdlets.filter(function(c) {
                if (searchLower) {
                    var nameRaw = fuzzyScore(searchLower, c.name);
                    var nameScore = nameRaw * (1 + searchLower.length / c.name.length);
                    c._score = nameScore +
                        fuzzyScore(searchLower, c.description) * 0.3 +
                        fuzzyScore(searchLower, c.category) * 0.2;
                    if (c._score < searchLower.length * 2) return false;
                } else {
                    c._score = 0;
                }
                var matchesCat = !categoryVal || c.category === categoryVal;
                var matchesMod = !moduleVal || c.module === moduleVal;
                var matchesPerm = !permVal || (permissionIndex.has(permVal) && permissionIndex.get(permVal).has(c.name));
                var matchesApi = !apiVal || c.apiVersion === apiVal;
                var matchesVerb = activeVerbs.size === 0 || activeVerbs.has(c.verb);
                return matchesCat && matchesMod && matchesPerm && matchesApi && matchesVerb;
            });

            if (searchLower) {
                filteredCmdlets.sort(function(a, b) { return b._score - a._score; });
            } else {
                switch (currentSort) {
                    case 'category': filteredCmdlets.sort(function(a, b) { return a.category.localeCompare(b.category) || a.name.localeCompare(b.name); }); break;
                    case 'permissions': filteredCmdlets.sort(function(a, b) { return b.permissionCount - a.permissionCount || a.name.localeCompare(b.name); }); break;
                    case 'examples': filteredCmdlets.sort(function(a, b) { return (b.hasExamples ? 1 : 0) - (a.hasExamples ? 1 : 0) || a.name.localeCompare(b.name); }); break;
                    default: filteredCmdlets.sort(function(a, b) { return a.name.localeCompare(b.name); });
                }
            }

            focusedCardIndex = -1;
            renderCmdlets();
            updateStats();
            serializeState();
            buildAlphaIndex();
            updateFilterBadge();
        }

        // -- Build card HTML for a single cmdlet (summary from manifest) --
        function buildCardHtml(c, animDelay) {
            var verb = (c.verb || getVerb(c.name)).toLowerCase();
            var learnUrl = getLearnUrl(c);
            var learnLink = learnUrl ? ' <a href="' + learnUrl + '" target="_blank" rel="noopener" class="text-text-ghost hover:text-accent-sky transition-colors" title="Microsoft Learn docs" onclick="event.stopPropagation()"><svg class="w-3.5 h-3.5 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg></a>' : '';

            // API version badge
            var apiClass = c.apiVersion === 'beta' ? 'bg-accent-amber/10 text-accent-amber border-accent-amber/20' : 'bg-accent-sky/10 text-accent-sky border-accent-sky/20';
            var apiBadge = '<span class="shrink-0 text-xs px-1.5 py-0.5 rounded-md border ' + apiClass + '">' + escapeHtml(c.apiVersion || 'v1.0') + '</span>';

            // Permission count badge
            var permBadge = c.permissionCount > 0
                ? '<span class="inline-block bg-accent-indigo/10 border border-accent-indigo/20 text-accent-indigo px-1.5 py-0.5 text-xs rounded-md">' + c.permissionCount + ' perm' + (c.permissionCount > 1 ? 's' : '') + '</span>'
                : '';

            // Examples indicator
            var exBadge = c.hasExamples
                ? '<span class="inline-block bg-accent-emerald/10 border border-accent-emerald/20 text-accent-emerald px-1.5 py-0.5 text-xs rounded-md">examples</span>'
                : '';

            return '<div class="cmdlet-card bg-surface-900 border border-surface-700/50 rounded-xl p-5 transition-all duration-200 flex flex-col hover:border-surface-600 hover:ring-1 hover:ring-accent-sky/10 border-l-[3px] opacity-0 animate-fade-in verb-' + escapeHtml(verb) + ' cursor-pointer" style="animation-delay: ' + animDelay + 'ms" data-name="' + escapeHtml(c.name) + '" data-module="' + escapeHtml(c.module) + '">' +
                '<div class="flex items-start justify-between gap-3 mb-2">' +
                '<div class="font-mono text-accent-sky font-medium break-all leading-snug">' + escapeHtml(c.name) + learnLink + '</div>' +
                '<div class="flex items-center gap-1.5 shrink-0">' + apiBadge +
                '<span class="bg-surface-800 text-text-tertiary text-xs px-2 py-0.5 rounded-md">' + escapeHtml(c.category) + '</span></div></div>' +
                '<p class="text-sm text-text-secondary line-clamp-2 mb-3">' + escapeHtml(c.description) + '</p>' +
                '<div class="flex flex-wrap gap-1.5 mb-3">' + permBadge + exBadge + '</div>' +
                '<div class="card-detail"></div>' +
                '</div>';
        }

        // -- Render next chunk of cards --
        function renderNextChunk() {
            var grid = document.getElementById('cmdletsGrid');
            var chunk = filteredCmdlets.slice(renderedCount, renderedCount + CHUNK_SIZE);
            if (chunk.length === 0) return;

            var html = chunk.map(function(c, i) {
                var delay = Math.min(i * 15, 300);
                return buildCardHtml(c, delay);
            }).join('');

            grid.insertAdjacentHTML('beforeend', html);
            renderedCount += chunk.length;

            if (renderedCount >= filteredCmdlets.length) {
                var sentinel = document.getElementById('scrollSentinel');
                if (scrollObserver && sentinel) scrollObserver.unobserve(sentinel);
            }
        }

        // -- Render cmdlet cards (reset + first chunk) --
        function renderCmdlets() {
            var grid = document.getElementById('cmdletsGrid');
            var noResults = document.getElementById('noResults');

            if (filteredCmdlets.length === 0) {
                grid.classList.add('hidden');
                noResults.classList.remove('hidden');
                return;
            }

            grid.classList.remove('hidden');
            noResults.classList.add('hidden');

            renderedCount = 0;
            grid.innerHTML = '';
            renderNextChunk();
            setupScrollObserver();
        }

        // -- IntersectionObserver for progressive loading --
        function setupScrollObserver() {
            if (scrollObserver) scrollObserver.disconnect();
            var sentinel = document.getElementById('scrollSentinel');
            scrollObserver = new IntersectionObserver(function(entries) {
                if (entries[0].isIntersecting && renderedCount < filteredCmdlets.length) {
                    renderNextChunk();
                }
            }, { rootMargin: '200px' });
            scrollObserver.observe(sentinel);
        }

        // -- Update stats --
        function updateStats() {
            document.getElementById('totalCmdlets').textContent = cmdlets.length;
            document.getElementById('filteredCount').textContent = filteredCmdlets.length;
        }

        // -- Theme --
        function applyTheme(theme) {
            currentTheme = theme;
            document.documentElement.classList.toggle('dark', theme === 'dark');
            localStorage.setItem('theme', theme);
            updateThemeIcons();
        }
        function updateThemeIcons() {
            var isDark = document.documentElement.classList.contains('dark');
            document.getElementById('themeIconSun').classList.toggle('hidden', !isDark);
            document.getElementById('themeIconMoon').classList.toggle('hidden', isDark);
        }

        // -- Fuzzy search --
        function fuzzyScore(query, target) {
            if (!query || !target) return 0;
            var q = query.toLowerCase();
            var t = target.toLowerCase();
            if (t.includes(q)) return 100 + (q.length / t.length) * 50;
            var qi = 0, score = 0, consecutive = 0, lastIdx = -2;
            for (var ti = 0; ti < t.length && qi < q.length; ti++) {
                if (t[ti] === q[qi]) {
                    score += 1;
                    if (ti === lastIdx + 1) { consecutive++; score += consecutive * 2; }
                    else consecutive = 0;
                    if (ti === 0 || t[ti-1] === '-' || t[ti-1] === ' ' || t[ti-1] === '.') score += 5;
                    lastIdx = ti; qi++;
                }
            }
            return qi === q.length ? score : 0;
        }

        // -- Syntax highlighting --
        function highlightPowerShell(code) {
            var html = code;
            html = html.replace(/(&#39;[^&#]*?&#39;)/g, '<span class="ps-string">$1</span>');
            html = html.replace(/(&quot;[^&]*?&quot;)/g, '<span class="ps-string">$1</span>');
            html = html.replace(/((?<!&)#[^\n]*)/g, '<span class="ps-comment">$1</span>');
            html = html.replace(/(\$\w+)/g, '<span class="ps-variable">$1</span>');
            html = html.replace(/\b([A-Z][a-z]+-[A-Z]\w+)/g, '<span class="ps-cmdlet">$1</span>');
            html = html.replace(/(\[[A-Z]\w+(?:\.\w+)*(?:\[\])?\])/g, '<span class="ps-type">$1</span>');
            return html;
        }

        // -- Parameter parsing --
        var commonParams = new Set(['WhatIf','Confirm','Break','Headers','HttpPipelineAppend','HttpPipelinePrepend','Proxy','ProxyCredential','ProxyUseDefaultCredentials','ResponseHeadersVariable','AdditionalProperties']);
        function parseParameters(syntax) {
            var params = [];
            var paramStr = syntax.substring(syntax.indexOf(' ') + 1);
            var re = /(\[)?-(\w+)(?:\s+<([^>]+)>)?/g;
            var m;
            while ((m = re.exec(paramStr)) !== null) {
                if (commonParams.has(m[2]) || m[2] === 'CommonParameters') continue;
                params.push({ name: m[2], type: m[3] || 'switch', required: !m[1] });
            }
            return params;
        }

        // -- Learn URL --
        function getLearnUrl(c) {
            if (!c.module) return '';
            return 'https://learn.microsoft.com/en-us/powershell/module/' + c.module.toLowerCase() + '/' + c.name.toLowerCase();
        }

        // -- Noun map for related cmdlets --
        function buildNounMap() {
            nounMap = {};
            cmdlets.forEach(function(c) {
                var idx = c.name.indexOf('-');
                if (idx > 0) {
                    var noun = c.name.substring(idx + 1);
                    if (!nounMap[noun]) nounMap[noun] = [];
                    nounMap[noun].push(c.name);
                }
            });
        }

        // -- Alpha index sidebar --
        function buildAlphaIndex() {
            var nav = document.getElementById('alphaIndex');
            if (!nav) return;
            var letters = [...new Set(filteredCmdlets.map(function(c) { return c.name[0].toUpperCase(); }))].sort();
            nav.innerHTML = letters.map(function(l) {
                return '<button class="px-1 py-0.5 hover:text-accent-sky transition-colors" onclick="scrollToLetter(\'' + l + '\')">' + l + '</button>';
            }).join('');
        }
        function scrollToLetter(letter) {
            var idx = filteredCmdlets.findIndex(function(c) { return c.name[0].toUpperCase() === letter; });
            if (idx < 0) return;
            while (renderedCount <= idx) renderNextChunk();
            var cards = document.querySelectorAll('#cmdletsGrid > div');
            if (cards[idx]) cards[idx].scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // -- Recent searches --
        function showRecentSearches() {
            var dd = document.getElementById('recentSearches');
            var input = document.getElementById('searchInput');
            if (input.value || recentSearches.length === 0) { dd.classList.add('hidden'); return; }
            dd.classList.remove('hidden');
            dd.innerHTML = recentSearches.map(function(s) {
                return '<button class="block w-full text-left px-3 py-1.5 text-sm text-text-secondary hover:bg-surface-800 hover:text-text-primary transition-colors" onclick="applyRecentSearch(this.textContent)">' + escapeHtml(s) + '</button>';
            }).join('') +
            '<button class="block w-full text-left px-3 py-1.5 text-xs text-text-ghost hover:text-accent-rose transition-colors border-t border-surface-700" onclick="clearRecentSearches()">Clear History</button>';
        }
        function saveRecentSearch(term) {
            if (!term || term.length < 2) return;
            recentSearches = [term, ...recentSearches.filter(function(s) { return s !== term; })].slice(0, 8);
            localStorage.setItem('recentSearches', JSON.stringify(recentSearches));
        }
        function applyRecentSearch(term) {
            document.getElementById('searchInput').value = term;
            document.getElementById('recentSearches').classList.add('hidden');
            filterCmdlets();
        }
        function clearRecentSearches() {
            recentSearches = [];
            localStorage.removeItem('recentSearches');
            document.getElementById('recentSearches').classList.add('hidden');
        }

        // -- URL hash routing --
        function serializeState() {
            var p = new URLSearchParams();
            var q = document.getElementById('searchInput').value;
            if (q) p.set('q', q);
            var cat = document.getElementById('categoryFilter').value;
            if (cat) p.set('cat', cat);
            var mod = document.getElementById('moduleFilter').value;
            if (mod) p.set('mod', mod);
            var perm = document.getElementById('permissionFilter').value;
            if (perm) p.set('perm', perm);
            var api = document.getElementById('apiVersionFilter').value;
            if (api) p.set('api', api);
            if (activeVerbs.size > 0) p.set('verbs', [...activeVerbs].join(','));
            if (currentSort !== 'alpha') p.set('sort', currentSort);
            var hash = p.toString();
            history.replaceState(null, '', hash ? '#' + hash : location.pathname + location.search);
        }
        function restoreState() {
            var hash = location.hash.slice(1);
            if (!hash) { filterCmdlets(); return; }
            var p = new URLSearchParams(hash);
            if (p.has('q')) document.getElementById('searchInput').value = p.get('q');
            if (p.has('cat')) document.getElementById('categoryFilter').value = p.get('cat');
            if (p.has('mod')) document.getElementById('moduleFilter').value = p.get('mod');
            if (p.has('perm')) document.getElementById('permissionFilter').value = p.get('perm');
            if (p.has('api')) document.getElementById('apiVersionFilter').value = p.get('api');
            if (p.has('verbs')) { activeVerbs = new Set(p.get('verbs').split(',')); refreshVerbButtonStyles(); }
            if (p.has('sort')) { currentSort = p.get('sort'); document.getElementById('sortSelect').value = currentSort; }
            filterCmdlets();
        }

        // -- Verb button styles --
        function refreshVerbButtonStyles() {
            document.querySelectorAll('#verbFilters button').forEach(function(btn) {
                var f = btn.dataset.filter;
                var active = (f === 'all' && activeVerbs.size === 0) || activeVerbs.has(f);
                tagActive.split(' ').forEach(function(cls) { btn.classList.toggle(cls, active); });
                tagInactive.split(' ').forEach(function(cls) { btn.classList.toggle(cls, !active); });
            });
        }

        // -- Saved presets --
        function savePreset() {
            var name = prompt('Preset name:');
            if (!name) return;
            savedPresets.push({
                name: name,
                q: document.getElementById('searchInput').value,
                cat: document.getElementById('categoryFilter').value,
                mod: document.getElementById('moduleFilter').value,
                perm: document.getElementById('permissionFilter').value,
                api: document.getElementById('apiVersionFilter').value,
                verbs: [...activeVerbs],
                sort: currentSort
            });
            localStorage.setItem('savedPresets', JSON.stringify(savedPresets));
            renderPresets();
        }
        function loadPreset(idx) {
            var p = savedPresets[idx];
            if (!p) return;
            document.getElementById('searchInput').value = p.q || '';
            document.getElementById('categoryFilter').value = p.cat || '';
            document.getElementById('moduleFilter').value = p.mod || '';
            document.getElementById('permissionFilter').value = p.perm || '';
            document.getElementById('apiVersionFilter').value = p.api || '';
            activeVerbs = new Set(p.verbs || []);
            currentSort = p.sort || 'alpha';
            document.getElementById('sortSelect').value = currentSort;
            refreshVerbButtonStyles();
            filterCmdlets();
        }
        function deletePreset(idx) {
            savedPresets.splice(idx, 1);
            localStorage.setItem('savedPresets', JSON.stringify(savedPresets));
            renderPresets();
        }
        function renderPresets() {
            var el = document.getElementById('presetsList');
            if (!el) return;
            el.innerHTML = savedPresets.map(function(p, i) {
                return '<span class="inline-flex items-center gap-1 px-2.5 py-1 text-xs font-medium rounded-full border border-surface-700 text-text-secondary hover:border-surface-600 transition-colors">' +
                '<button onclick="loadPreset(' + i + ')" class="hover:text-text-primary">' + escapeHtml(p.name) + '</button>' +
                '<button onclick="deletePreset(' + i + ')" class="text-text-ghost hover:text-accent-rose ml-0.5">&times;</button></span>';
            }).join('');
        }

        // -- Export --
        function toggleExportMenu() { document.getElementById('exportMenu').classList.toggle('hidden'); }
        function exportResults(format) {
            document.getElementById('exportMenu').classList.add('hidden');
            var content, filename, mime;
            if (format === 'json') {
                var data = filteredCmdlets.map(function(c) { return { name: c.name, category: c.category, module: c.module, apiVersion: c.apiVersion, description: c.description }; });
                content = JSON.stringify(data, null, 2);
                filename = 'cmdlets.json'; mime = 'application/json';
            } else {
                var rows = [['Name','Category','Module','API Version','Description']];
                filteredCmdlets.forEach(function(c) { rows.push([c.name, c.category, c.module || '', c.apiVersion || '', '"' + c.description.replace(/"/g, '""') + '"']); });
                content = rows.map(function(r) { return r.map(function(v) { return '"' + String(v).replace(/"/g, '""') + '"'; }).join(','); }).join('\n');
                filename = 'cmdlets.csv'; mime = 'text/csv';
            }
            var blob = new Blob([content], { type: mime });
            var a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = filename;
            document.body.appendChild(a); a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(a.href);
        }

        // -- Clipboard --
        function copyText(text) {
            if (navigator.clipboard) { navigator.clipboard.writeText(text); }
            else { var t = document.createElement('textarea'); t.value = text; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); }
        }

        // -- Mobile filter badge --
        function updateFilterBadge() {
            var count = 0;
            if (activeVerbs.size > 0) count++;
            if (document.getElementById('categoryFilter').value) count++;
            if (document.getElementById('moduleFilter').value) count++;
            if (document.getElementById('permissionFilter').value) count++;
            if (document.getElementById('apiVersionFilter').value) count++;
            var badge = document.getElementById('filterBadge');
            if (count > 0) { badge.textContent = count; badge.classList.remove('hidden'); }
            else { badge.classList.add('hidden'); }
        }
        function toggleMobileFilters() {
            var f = document.getElementById('verbFilters');
            f.classList.toggle('hidden');
            f.classList.toggle('flex');
        }

        // -- Onboarding --
        var onboardingTips = [
            { target: '#searchInput', text: 'Search by cmdlet name, description, or category. Supports fuzzy matching.' },
            { target: '#verbFilters', text: 'Click verb buttons to filter by action type. Select multiple verbs at once.' },
            { target: '#categoryFilter', text: 'Use dropdowns to filter by category, module, API version, or change sort order.' },
            { target: '#cmdletsGrid', text: 'Click any card to expand it and load full details (syntax, examples, permissions).' }
        ];
        function showNextTip() {
            if (onboardingStep >= onboardingTips.length) { dismissOnboarding(); return; }
            var tip = onboardingTips[onboardingStep];
            var target = document.querySelector(tip.target);
            if (!target) { onboardingStep++; showNextTip(); return; }
            var overlay = document.getElementById('onboardingOverlay');
            var tipEl = document.getElementById('onboardingTip');
            overlay.classList.remove('hidden');
            document.getElementById('tipText').textContent = tip.text;
            var rect = target.getBoundingClientRect();
            tipEl.style.top = Math.min(rect.bottom + 8, window.innerHeight - 150) + 'px';
            tipEl.style.left = Math.max(8, Math.min(rect.left, window.innerWidth - 320)) + 'px';
            onboardingStep++;
        }
        function dismissOnboarding() {
            hasSeenOnboarding = true;
            localStorage.setItem('hasSeenOnboarding', 'true');
            document.getElementById('onboardingOverlay').classList.add('hidden');
        }

        // -- Keyboard focus --
        function updateCardFocus() {
            document.querySelectorAll('.card-focused').forEach(function(el) { el.classList.remove('card-focused'); });
            var cards = document.querySelectorAll('#cmdletsGrid > .cmdlet-card');
            if (focusedCardIndex >= 0 && focusedCardIndex < cards.length) {
                cards[focusedCardIndex].classList.add('card-focused');
                cards[focusedCardIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        // -- Event listeners --
        document.getElementById('searchInput').addEventListener('input', debounce(filterCmdlets, 150));
        document.getElementById('searchInput').addEventListener('focus', showRecentSearches);
        document.getElementById('searchInput').addEventListener('blur', function() {
            setTimeout(function() { document.getElementById('recentSearches').classList.add('hidden'); }, 200);
        });
        document.getElementById('categoryFilter').addEventListener('change', filterCmdlets);
        document.getElementById('moduleFilter').addEventListener('change', filterCmdlets);
        document.getElementById('permissionFilter').addEventListener('change', filterCmdlets);
        document.getElementById('apiVersionFilter').addEventListener('change', filterCmdlets);
        document.getElementById('sortSelect').addEventListener('change', filterCmdlets);

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (e.key === '/' && !['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName)) {
                e.preventDefault(); document.getElementById('searchInput').focus(); return;
            }
            if (e.key === 'Escape') {
                document.getElementById('searchInput').value = '';
                document.getElementById('searchInput').blur();
                document.getElementById('recentSearches').classList.add('hidden');
                focusedCardIndex = -1;
                document.querySelectorAll('.card-focused').forEach(function(el) { el.classList.remove('card-focused'); });
                filterCmdlets(); return;
            }
            if (['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName)) return;
            var cards = document.querySelectorAll('#cmdletsGrid > .cmdlet-card');
            if (e.key === 'ArrowDown' || e.key === 'j') {
                e.preventDefault();
                focusedCardIndex = Math.min(focusedCardIndex + 1, cards.length - 1);
                while (renderedCount <= focusedCardIndex) renderNextChunk();
                updateCardFocus();
            } else if (e.key === 'ArrowUp' || e.key === 'k') {
                e.preventDefault();
                focusedCardIndex = Math.max(focusedCardIndex - 1, 0);
                updateCardFocus();
            } else if (e.key === 'Enter' && focusedCardIndex >= 0 && focusedCardIndex < cards.length) {
                e.preventDefault();
                var card = cards[focusedCardIndex];
                card.classList.toggle('card-expanded');
                if (card.classList.contains('card-expanded')) {
                    var name = card.dataset.name;
                    var mod = card.dataset.module;
                    if (name && mod) populateCardDetail(card, name, mod);
                    card.querySelectorAll('details').forEach(function(d) { d.open = true; });
                } else {
                    card.querySelectorAll('details').forEach(function(d) { d.open = false; });
                }
            }
        });

        // Card expand/collapse + copy (event delegation)
        document.getElementById('cmdletsGrid').addEventListener('click', function(e) {
            var copyBtn = e.target.closest('[data-copy-syntax], [data-copy-ex]');
            if (copyBtn) {
                e.stopPropagation();
                var container = copyBtn.closest('.relative') || copyBtn.closest('.group');
                var pre = container ? container.querySelector('pre, div.bg-surface-800') : null;
                if (pre) {
                    copyText(pre.textContent);
                    var svg = copyBtn.querySelector('svg');
                    if (svg) { var orig = svg.innerHTML; svg.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>'; setTimeout(function() { svg.innerHTML = orig; }, 1500); }
                }
                return;
            }
            if (e.target.closest('a, button, details, summary, select')) return;
            var card = e.target.closest('.cmdlet-card');
            if (!card) return;
            card.classList.toggle('card-expanded');
            if (card.classList.contains('card-expanded')) {
                var name = card.dataset.name;
                var mod = card.dataset.module;
                if (name && mod) populateCardDetail(card, name, mod);
                card.querySelectorAll('details').forEach(function(d) { d.open = true; });
            } else {
                card.querySelectorAll('details').forEach(function(d) { d.open = false; });
            }
        });

        // Back-to-top
        window.addEventListener('scroll', function() {
            var btn = document.getElementById('backToTop');
            if (window.scrollY > 400) { btn.classList.remove('opacity-0','pointer-events-none'); btn.classList.add('opacity-100'); }
            else { btn.classList.add('opacity-0','pointer-events-none'); btn.classList.remove('opacity-100'); }
        }, { passive: true });

        // Close export menu on outside click
        document.addEventListener('click', function(e) {
            if (!e.target.closest('#exportWrap')) document.getElementById('exportMenu').classList.add('hidden');
        });

        // Popstate for back/forward
        window.addEventListener('popstate', restoreState);

        // Dismiss onboarding on scroll
        window.addEventListener('scroll', function() {
            if (!hasSeenOnboarding && !document.getElementById('onboardingOverlay').classList.contains('hidden')) dismissOnboarding();
        }, { passive: true, once: true });

        function switchTheme(file) {
            if (file && file !== location.pathname.split('/').pop()) {
                location.href = file + location.hash;
            }
        }

        // -- Init --
        document.addEventListener('DOMContentLoaded', loadCmdlets);
    </script>
</body>
</html>
