name: Update cmdlet data

on:
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch:

concurrency:
  group: update-cmdlet-data
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    outputs:
      changes_detected: ${{ steps.auto-commit.outputs.changes_detected }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone Microsoft Graph docs
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/MicrosoftDocs/microsoftgraph-docs-powershell.git docs
          cd docs && git sparse-checkout set microsoftgraph/graph-powershell-1.0 microsoftgraph/graph-powershell-beta

      - name: Parse documentation
        run: python3 scripts/parse_docs.py docs/microsoftgraph

      - name: Commit updated data
        id: auto-commit
        run: |
          git add public/data/**
          if git diff --cached --quiet; then
            echo "changes_detected=false" >> "$GITHUB_OUTPUT"
          else
            git -c user.name="github-actions[bot]" \
                -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
                commit -m "chore: update cmdlet metadata"
            echo "changes_detected=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push changes
        if: ${{ !env.ACT && steps.auto-commit.outputs.changes_detected == 'true' }}
        run: git push

  deploy:
    needs: update-data
    if: ${{ !env.ACT && needs.update-data.outputs.changes_detected == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
